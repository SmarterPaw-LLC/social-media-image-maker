<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmarterPaw Social Image Tool</title>
<style>
:root {
  --green:#8ab81d;--green-dark:#3c8e14;--orange:#f6ae40;--orange-dark:#f07830;
  --bg:#f4f5f0;--panel:#ffffff;--border:#e0e0d8;--text:#1a1a1a;--muted:#888;
  --radius:10px;--shadow:0 2px 16px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(135deg,var(--green) 0%,var(--green-dark) 100%);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
header h1{font-size:18px;font-weight:800;letter-spacing:-0.02em;}
header span{font-size:12px;opacity:0.8;}
.header-spacer{flex:1;}
.header-btns{display:flex;gap:8px;}
.btn-hdr{background:#fff;color:var(--green-dark);border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.12);transition:transform 0.15s,box-shadow 0.15s;}
.btn-hdr:hover{transform:scale(1.03);box-shadow:0 4px 16px rgba(0,0,0,0.18);}
.brand-switcher{display:inline-flex;background:rgba(255,255,255,0.2);border-radius:7px;padding:3px;gap:2px;}
.brand-opt{padding:6px 12px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;border-radius:5px;border:none;background:transparent;transition:background 0.15s;}
.brand-opt.active{background:#fff;color:var(--green-dark);}
.brand-opt:not(.active):hover{background:rgba(255,255,255,0.15);}
.app{display:flex;height:calc(100vh - 52px);overflow:hidden;}
.sidebar{width:290px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;}
.panel-section{display:flex;flex-direction:column;gap:7px;}
.panel-section h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);padding-bottom:5px;border-bottom:1px solid var(--border);}
label{font-size:12px;font-weight:600;color:var(--text);display:block;margin-bottom:2px;}
input[type=text],input[type=number],select,textarea{width:100%;padding:7px 9px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;background:#fafafa;transition:border-color 0.15s;font-family:inherit;}
input[type=text]:focus,input[type=number]:focus,select:focus,textarea:focus{outline:none;border-color:var(--green);}
textarea{resize:vertical;min-height:52px;}
input[type=range]{width:100%;accent-color:var(--green);}
input[type=color]{width:40px;height:28px;border:1.5px solid var(--border);border-radius:5px;cursor:pointer;padding:2px;}
.row{display:flex;gap:7px;align-items:center;}
.col2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.col3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.range-row{display:flex;gap:7px;align-items:center;}
.range-row input[type=range]{flex:1;}
.range-val{font-size:11px;color:var(--muted);width:28px;text-align:right;flex-shrink:0;}
.color-row{display:flex;gap:7px;align-items:center;}
.color-row label{margin:0;flex:1;font-size:11px;}
.size-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:7px 4px;border:2px solid var(--border);border-radius:7px;cursor:pointer;font-size:10px;font-weight:600;color:var(--muted);background:#fafafa;transition:all 0.15s;line-height:1.2;}
.size-btn:hover{border-color:var(--green);color:var(--green);}
.size-btn.active{border-color:var(--green);background:#f0f8e8;color:var(--green-dark);}
.size-btn .icon{font-size:16px;}
.sizes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.layer-item{display:flex;align-items:center;gap:7px;padding:7px 9px;border:1.5px solid var(--border);border-radius:7px;cursor:pointer;font-size:11px;font-weight:600;background:#fafafa;transition:all 0.15s;}
.layer-item:hover{border-color:var(--green);}
.layer-item.active{border-color:var(--green);background:#f0f8e8;}
.layer-item .ltype{font-size:14px;}
.layer-item .lname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.layer-del{color:#ccc;font-size:13px;cursor:pointer;padding:2px 4px;border-radius:4px;}
.layer-del:hover{color:#e53;background:#fee;}
.btn-add{width:100%;padding:8px;border:2px dashed var(--border);border-radius:7px;font-size:12px;font-weight:600;color:var(--muted);background:none;cursor:pointer;transition:all 0.15s;}
.btn-add:hover{border-color:var(--green);color:var(--green);}
.btn-sm{padding:5px 10px;border:1.5px solid var(--border);border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;background:#fafafa;transition:all 0.15s;}
.btn-sm:hover{border-color:var(--green);color:var(--green);}
.btn-sm.danger:hover{border-color:#e53;color:#e53;}
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;background:#e8e8e0;position:relative;padding:32px;}
.canvas-wrap{position:relative;box-shadow:0 8px 48px rgba(0,0,0,0.2);border-radius:4px;overflow:hidden;cursor:default;background:#fff;user-select:none;}
#mainCanvas{display:block;}
.drop-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity 0.2s;background:rgba(138,184,29,0.08);border:3px dashed var(--green);border-radius:4px;font-size:15px;font-weight:700;color:var(--green);}
.canvas-wrap.drag-over .drop-hint{opacity:1;}
.zoom-controls{position:absolute;bottom:14px;right:14px;display:flex;gap:5px;}
.zoom-btn{width:30px;height:30px;border-radius:7px;border:1.5px solid var(--border);background:var(--panel);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:all 0.15s;}
.zoom-btn:hover{border-color:var(--green);}
.zoom-label{background:var(--panel);border:1.5px solid var(--border);border-radius:7px;padding:0 9px;font-size:11px;font-weight:700;color:var(--muted);display:flex;align-items:center;box-shadow:var(--shadow);}
.hidden{display:none!important;}
.divider{height:1px;background:var(--border);margin:1px 0;}
.prop-section{display:flex;flex-direction:column;gap:7px;}
.sticker-line-block{padding:8px;border:1.5px solid var(--border);border-radius:7px;display:flex;flex-direction:column;gap:5px;margin-bottom:5px;}
.alert{padding:7px 11px;border-radius:6px;font-size:11px;font-weight:600;}
.alert-green{background:#f0f8e8;color:var(--green-dark);border:1px solid #c5e0a0;}

/* Gradient presets */
.preset-grid{display:flex;flex-wrap:wrap;gap:5px;}
.preset-swatch{width:36px;height:36px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all 0.15s;position:relative;flex-shrink:0;}
.preset-swatch:hover{transform:scale(1.1);border-color:var(--text);}
.preset-swatch.active{border-color:var(--text);box-shadow:0 0 0 2px #fff,0 0 0 4px var(--text);}
.preset-swatch .del-preset{display:none;position:absolute;top:-5px;right:-5px;width:14px;height:14px;background:#e53;color:#fff;border-radius:50%;font-size:9px;align-items:center;justify-content:center;cursor:pointer;}
.preset-swatch:hover .del-preset{display:flex;}
.add-preset-btn{width:36px;height:36px;border-radius:6px;border:2px dashed var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--muted);background:none;transition:all 0.15s;}
.add-preset-btn:hover{border-color:var(--green);color:var(--green);}

/* Shape buttons */
.shape-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.shape-btn{padding:8px 4px;border:1.5px solid var(--border);border-radius:6px;cursor:pointer;font-size:18px;text-align:center;background:#fafafa;transition:all 0.15s;}
.shape-btn:hover{border-color:var(--green);background:#f0f8e8;}

/* Resize handles on canvas */
.resize-handle{position:absolute;width:10px;height:10px;background:#fff;border:2px solid var(--green);border-radius:2px;cursor:nwse-resize;z-index:100;}

/* Export modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:1000;}
.modal{background:#fff;border-radius:12px;padding:24px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.modal h2{font-size:16px;font-weight:800;margin-bottom:16px;}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
.btn-primary{padding:9px 20px;background:linear-gradient(135deg,var(--green),var(--green-dark));color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-cancel{padding:9px 16px;background:#fafafa;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=Fraunces:wght@400;800&family=Ultra&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px;">
    <img id="headerLogo" style="height:38px;width:auto;display:block;" alt="Brand logo" />
    <div><h1>🐾 Social Image Tool</h1><span>SmarterPaw Marketing · v30</span></div>
  </div>
  <div class="header-spacer"></div>
  <div class="brand-switcher" id="brandSwitcher">
    <button class="brand-opt active" data-brand="meowi" onclick="setBrand('meowi')">Meowi/Doggi</button>
    <button class="brand-opt" data-brand="kkz" onclick="setBrand('kkz')">Kitty Ka-Zoom</button>
  </div>
  <div class="header-btns">
    <button class="btn-hdr" onclick="openExportModal()">⬇ Export</button>
  </div>
</header>

<div class="app">
<div class="sidebar">

  <!-- Canvas size -->
  <div class="panel-section">
    <h3>Canvas Size</h3>
    <div class="sizes-grid" id="sizeGrid"></div>
    <div class="col2" style="margin-top:3px;">
      <div><label>W (px)</label><input type="number" id="customW" value="1080" min="100" max="6000" onchange="applyCustomSize()"></div>
      <div><label>H (px)</label><input type="number" id="customH" value="1080" min="100" max="6000" onchange="applyCustomSize()"></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Gradient presets -->
  <div class="panel-section">
    <h3>Gradient Presets</h3>
    <div class="preset-grid" id="presetGrid"></div>
  </div>

  <div class="divider"></div>

  <!-- Layers -->
  <div class="panel-section">
    <h3>Layers</h3>
    <div id="layerList" style="display:flex;flex-direction:column;gap:4px;"></div>
    <div class="col2" style="margin-top:3px;">
      <button class="btn-add" onclick="addImageLayer()">+ Image</button>
      <button class="btn-add" id="addStickerBtn" onclick="addStickerLayer()">+ Sticker</button>
    </div>
    <div class="col2">
      <button class="btn-add" onclick="addTextLayer()">+ Text</button>
      <button class="btn-add" onclick="openShapeMenu()">+ Shape</button>
    </div>
    <div class="col2">
      <button class="btn-add" onclick="addSvgLayer()">+ SVG</button>
      <span></span>
    </div>
    <div id="logoButtonGroup" style="display:flex;flex-direction:column;gap:5px;"></div>
    <!-- Shape picker (hidden by default) -->
    <div id="shapeMenu" class="hidden" style="border:1.5px solid var(--border);border-radius:8px;padding:8px;background:#fafafa;">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;">Pick a shape</div>
      <div class="shape-grid" id="shapeGrid"></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Layer properties -->
  <div class="panel-section">
    <h3>Properties</h3>
    <div id="propContent"><div class="alert alert-green">Select or add a layer to edit.</div></div>
  </div>

</div>

<!-- Canvas area -->
<div class="canvas-area" id="canvasArea">
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="mainCanvas"></canvas>
    <div class="drop-hint">Drop image here</div>
  </div>
  <div class="zoom-controls">
    <button class="zoom-btn" onclick="zoom(-0.1)">−</button>
    <div class="zoom-label" id="zoomLabel">100%</div>
    <button class="zoom-btn" onclick="zoom(0.1)">+</button>
    <button class="zoom-btn" onclick="fitZoom()" title="Fit">⊡</button>
  </div>
</div>
</div>

<!-- Export modal -->
<div class="modal-overlay hidden" id="exportModal">
  <div class="modal">
    <h2>⬇ Export Image</h2>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div>
        <label>Format</label>
        <select id="exportFormat">
          <option value="png">PNG (lossless, transparent support)</option>
          <option value="jpeg">JPG (smaller file, no transparency)</option>
          <option value="webp">WebP (best compression)</option>
        </select>
      </div>
      <div id="exportQualityWrap">
        <label>Quality <span id="exportQualityVal">92</span>%</label>
        <input type="range" id="exportQuality" min="10" max="100" step="2" value="92" oninput="document.getElementById('exportQualityVal').textContent=this.value">
      </div>
      <div>
        <label>Export Size</label>
        <select id="exportSizeMode" onchange="toggleExportSize()">
          <option value="full">Full resolution (canvas size)</option>
          <option value="custom">Custom size</option>
          <option value="scale">Scale factor</option>
        </select>
      </div>
      <div id="exportCustomSize" class="hidden col2">
        <div><label style="font-size:11px;">Width (px)</label><input type="number" id="exportW" value="1080" min="100" max="8000"></div>
        <div><label style="font-size:11px;">Height (px)</label><input type="number" id="exportH" value="1080" min="100" max="8000"></div>
      </div>
      <div id="exportScaleWrap" class="hidden">
        <label style="font-size:11px;">Scale factor</label>
        <select id="exportScale">
          <option value="0.5">0.5× (half size)</option>
          <option value="1" selected>1× (canvas size)</option>
          <option value="2">2× (double / retina)</option>
          <option value="3">3×</option>
        </select>
      </div>
      <div id="exportInfo" style="font-size:11px;color:var(--muted);"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeExportModal()">Cancel</button>
      <button class="btn-primary" onclick="doExport()">Export PNG</button>
    </div>
  </div>
</div>

<script>
// ── FONT ──
var COOPER_URL='https://cdn.shopify.com/s/files/1/0657/0831/files/CooperBlack-Std.otf';
var cooperLoaded=false;
(function(){var ff=new FontFace('CooperBlack','url('+COOPER_URL+')');ff.load().then(function(f){document.fonts.add(f);cooperLoaded=true;redraw();});})();

// ── TEXT-LAYER FONTS ──
// Per-brand font lists shown in the text-layer Font dropdown.
// Each entry: {label, family, weights:[], style}
// The family string is what goes into the canvas `font` property.
var FONTS_BY_BRAND = {
  meowi: [
    {label:'Cooper Black',   family:'CooperBlack',  weights:[400]},
    {label:'Poppins',        family:'Poppins',      weights:[400,500,700]}
  ],
  kkz: [
    {label:'Fraunces',       family:'Fraunces',     weights:[400,800]},
    {label:'Ultra',          family:'Ultra',        weights:[400]},
    {label:'Nunito',         family:'Nunito',       weights:[400,700]}
  ]
};

// Re-render text layers once web fonts are ready (important: canvas won't use the font until it's loaded)
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(function(){ redraw(); });
}

// ── BRAND LOGOS ──
// Default logos are hosted on Shopify CDN. Users can override via "Set Logos" UI (stored in localStorage).
var DEFAULT_LOGO_URLS = {
  meowi: 'https://cdn.shopify.com/s/files/1/0657/0831/files/Meowijuana_Logo_social.png?v=1776974640',
  doggi: 'https://cdn.shopify.com/s/files/1/0657/0831/files/Doggijuana_Logo-social.png?v=1776974656',
  kkz:   'https://cdn.shopify.com/s/files/1/0634/2796/9198/files/Kitty_Ka-Zoom_Logo_social.png?v=1776974760'
};
// LOGOS holds the "active" src for each brand — either a hosted URL, a user-uploaded data URI,
// or null while the hosted version is still loading.
var LOGOS = { meowi: null, doggi: null, kkz: null };
var currentBrand = 'meowi';

// Load user overrides (data URIs) from localStorage; otherwise use the hosted URL directly.
function initLogos(){
  ['meowi','doggi','kkz'].forEach(function(k){
    try{
      var saved = localStorage.getItem('sp_logo_' + k);
      LOGOS[k] = saved || DEFAULT_LOGO_URLS[k];
    }catch(e){
      LOGOS[k] = DEFAULT_LOGO_URLS[k];
    }
  });
}
initLogos();

// Per-brand gradient presets
var PRESETS_BY_BRAND = {
  meowi: [
    {id:'mp1', top:'#8ab81d', bottom:'#3c8e14', label:'Meowijuana Green'},
    {id:'mp2', top:'#f6ae40', bottom:'#f07830', label:'Meowijuana Orange'},
    {id:'mp3', top:'#5d539e', bottom:'#f472b6', label:'Purple Haze'},
    {id:'mp4', top:'#f37733', bottom:'#f5e020', label:'Hybrid Blend'}
  ],
  kkz: [
    // Brand gradients
    {id:'kp1', top:'#81C568', bottom:'#00A76B', label:'KKZ Green Gradient'},
    {id:'kp2', top:'#F4EA11', bottom:'#ECA223', label:'KKZ Yellow Gradient'},
    // Solid brand colors (top==bottom so gradient renders as solid)
    {id:'kp3', top:'#81C568', bottom:'#81C568', label:'Lime #81C568'},
    {id:'kp4', top:'#00A76B', bottom:'#00A76B', label:'Emerald #00A76B'},
    {id:'kp5', top:'#2F6E3B', bottom:'#2F6E3B', label:'Green #2F6E3B'},
    {id:'kp6', top:'#183F20', bottom:'#183F20', label:'Dark Green #183F20'},
    {id:'kp7', top:'#F4EA11', bottom:'#F4EA11', label:'Yellow #F4EA11'},
    {id:'kp8', top:'#ECA223', bottom:'#ECA223', label:'Orange #ECA223'}
  ]
};

function setBrand(b){
  currentBrand = b;
  gradientPresets = (PRESETS_BY_BRAND[b] || PRESETS_BY_BRAND.meowi).slice();
  loadPresets();
  activePresetId = gradientPresets.length ? gradientPresets[0].id : '';
  document.querySelectorAll('.brand-opt').forEach(function(el){el.classList.toggle('active', el.dataset.brand===b);});
  var logoGroup = document.getElementById('logoButtonGroup');
  if(logoGroup) logoGroup.innerHTML = buildLogoButtons(b);
  var stickerBtn = document.getElementById('addStickerBtn');
  if(stickerBtn) stickerBtn.style.display = (b === 'kkz') ? 'none' : '';
  var headerLogo = document.getElementById('headerLogo');
  if(headerLogo) headerLogo.src = (b === 'kkz') ? LOGOS.kkz : LOGOS.meowi;
  renderPresets();
  renderProps();
}

function buildLogoButtons(brand){
  var setLogosBtn = '<button class="btn-add" style="margin-top:6px;background:#f5f5f5;border:1px dashed #aaa;font-size:11px;" onclick="openLogoManager()">⚙ Set Logos…</button>';
  if(brand === 'kkz'){
    return '<button class="btn-add" onclick="addLogoLayer(\'kkz\')">+ Kitty Ka-Zoom Logo</button>' + setLogosBtn;
  }
  return '<div class="col2" style="gap:5px;">'
    + '<button class="btn-add" onclick="addLogoLayer(\'meowi\')">+ Meowijuana</button>'
    + '<button class="btn-add" onclick="addLogoLayer(\'doggi\')">+ Doggijuana</button>'
    + '</div>' + setLogosBtn;
}

function addLogoLayer(key){
  var src = LOGOS[key];
  if(!src){ alert('Logo not available: ' + key); return; }
  var img = new Image();
  // Needed so the remote image can be exported by canvas without tainting
  img.crossOrigin = 'anonymous';
  img.onload = function(){
    snapshotState();
    var id = nextId++;
    var natW = img.naturalWidth || 800;
    var natH = img.naturalHeight || 200;
    var targetW = Math.min(canvasW * 0.6, natW);
    var targetH = targetW * (natH / natW);
    var labelMap = {meowi:'Meowijuana', doggi:'Doggijuana', kkz:'Kitty Ka-Zoom'};
    layers.push({
      id: id, type: 'image',
      name: (labelMap[key] || 'Logo') + ' Logo',
      img: img, src: src,
      x: (canvasW - targetW) / 2,
      y: (canvasH - targetH) / 2,
      w: targetW, h: targetH,
      opacity: 100, fit: 'contain', flipH: false, flipV: false, rotation: 0
    });
    selectLayer(id); renderLayerList(); redraw();
  };
  img.onerror = function(){
    alert('Failed to load logo from:\n' + src + '\n\nCheck your internet connection.');
  };
  img.src = src;
}

// ── LOGO MANAGER (user-uploaded logos) ──
function openLogoManager(){
  var modal = document.getElementById('logoManagerModal');
  if(!modal){
    modal = document.createElement('div');
    modal.id = 'logoManagerModal';
    modal.className = 'modal-overlay';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;';
    modal.innerHTML = '<div style="background:#fff;border-radius:8px;padding:24px;width:520px;max-width:90vw;max-height:90vh;overflow:auto;">'
      + '<h3 style="margin:0 0 4px 0;">Brand Logos</h3>'
      + '<p style="font-size:12px;color:#666;margin:0 0 16px 0;">Upload PNG files with transparent backgrounds. Overrides saved to this browser only. Defaults come from the hosted CDN.</p>'
      + '<div id="logoManagerSlots"></div>'
      + '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">'
      + '<button class="btn-add" onclick="closeLogoManager()">Close</button>'
      + '</div></div>';
    document.body.appendChild(modal);
    modal.addEventListener('click', function(e){if(e.target===modal) closeLogoManager();});
  }
  renderLogoManagerSlots();
  modal.style.display = 'flex';
}

function closeLogoManager(){
  var modal = document.getElementById('logoManagerModal');
  if(modal) modal.style.display = 'none';
}

function renderLogoManagerSlots(){

// ── UNDO HISTORY ──
// Stack of serialized layer states. We snapshot BEFORE each user-initiated change.
// History is capped so memory doesn't grow unbounded.
var undoStack = [];
var redoStack = [];
var UNDO_LIMIT = 50;
var _undoSuppressed = false; // used to prevent snapshots during programmatic re-applies

function serializeLayers(){
  // Deep-clone layers but strip non-JSON-safe parts (HTMLImageElement).
  // Store the image src so we can rehydrate by creating a new Image() on undo.
  return JSON.stringify(layers.map(function(l){
    var out = {};
    for(var k in l){ if(k==='img') continue; out[k] = l[k]; }
    if(l.img){
      // prefer the stored src (for remote logos), else the img's own src
      out._imgSrc = l.src || l.img.src || null;
    }
    return out;
  }));
}

function deserializeLayers(json){
  var raw = JSON.parse(json);
  var restored = [];
  raw.forEach(function(o){
    if(o._imgSrc){
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function(){ redraw(); };
      img.src = o._imgSrc;
      o.img = img;
      delete o._imgSrc;
    }
    restored.push(o);
  });
  return restored;
}

function snapshotState(){
  if(_undoSuppressed) return;
  var snap = serializeLayers();
  // Don't push consecutive duplicates
  if(undoStack.length && undoStack[undoStack.length-1] === snap) return;
  undoStack.push(snap);
  if(undoStack.length > UNDO_LIMIT) undoStack.shift();
  redoStack = []; // new action invalidates redo
}

function undo(){
  if(!undoStack.length) return;
  // Capture the CURRENT state so redo can get back to it
  redoStack.push(serializeLayers());
  // Pop the most recent snapshot (which is the state BEFORE the most recent change) and restore it
  var prior = undoStack.pop();
  _undoSuppressed = true;
  layers = deserializeLayers(prior);
  if(!layers.find(function(l){return l.id===selectedId;})) selectedId = null;
  cropState = null; dragState = null; resizeState = null; rotateState = null;
  hideCropToolbar();
  renderLayerList(); renderProps(); redraw();
  _undoSuppressed = false;
}

function redo(){
  if(!redoStack.length) return;
  // Current state goes back onto undo stack
  undoStack.push(serializeLayers());
  var next = redoStack.pop();
  _undoSuppressed = true;
  layers = deserializeLayers(next);
  if(!layers.find(function(l){return l.id===selectedId;})) selectedId = null;
  cropState = null; dragState = null; resizeState = null; rotateState = null;
  hideCropToolbar();
  renderLayerList(); renderProps(); redraw();
  _undoSuppressed = false;
}

// ── KEYBOARD SHORTCUTS ──
function bindKeyboardShortcuts(){
  document.addEventListener('keydown', function(e){
    // Ignore if user is typing in an input/textarea/contenteditable
    var tgt = e.target;
    var tag = (tgt.tagName || '').toLowerCase();
    if(tag === 'input' || tag === 'textarea' || tgt.isContentEditable) return;

    // Undo / Redo
    var isMeta = e.metaKey || e.ctrlKey;
    if(isMeta && !e.shiftKey && e.key.toLowerCase() === 'z'){
      e.preventDefault(); undo(); return;
    }
    if(isMeta && (e.shiftKey && e.key.toLowerCase() === 'z' || e.key.toLowerCase() === 'y')){
      e.preventDefault(); redo(); return;
    }

    // Delete / Backspace on selected layer
    if((e.key === 'Delete' || e.key === 'Backspace') && selectedId != null){
      if(cropState) return; // don't delete while cropping
      e.preventDefault();
      snapshotState();
      deleteLayer(selectedId);
    }
  });
}

function addSvgLayer(){
  var input=document.createElement('input');input.type='file';input.accept='.svg,image/svg+xml';
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var svgText=ev.target.result;
      // create an image from the SVG blob for canvas rendering
      var blob=new Blob([svgText],{type:'image/svg+xml'});
      var url=URL.createObjectURL(blob);
      var img=new Image();
      img.onload=function(){
        snapshotState();
        var id=nextId++;
        layers.push({
          id:id,type:'svg',name:file.name.replace('.svg',''),
          img:img,svgText:svgText,url:url,
          x:canvasW*0.1,y:canvasH*0.1,
          w:Math.min(img.naturalWidth||canvasW*0.8,canvasW*0.8),
          h:Math.min(img.naturalHeight||canvasH*0.8,canvasH*0.8),
          opacity:100,rotation:0,
        });
        selectLayer(id);renderLayerList();redraw();
      };
      img.src=url;
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── SELECT / DELETE / MOVE ──
function selectLayer(id){selectedId=id;renderLayerList();renderProps();}
function deleteLayer(id){
  layers=layers.filter(function(l){return l.id!==id;});
  if(selectedId===id)selectedId=layers.length?layers[layers.length-1].id:null;
  renderLayerList();renderProps();redraw();
}
function moveLayer(id,dir){
  var idx=layers.findIndex(function(l){return l.id===id;});
  var ni=idx+dir;if(ni<0||ni>=layers.length)return;
  var t=layers[idx];layers[idx]=layers[ni];layers[ni]=t;
  renderLayerList();redraw();
}

function renderLayerList(){
  var list=document.getElementById('layerList');list.innerHTML='';
  for(var i=layers.length-1;i>=0;i--){
    (function(layer,layerIdx){
      var item=document.createElement('div');
      item.className='layer-item'+(layer.id===selectedId?' active':'');
      item.draggable=true;
      item.dataset.layerId=layer.id;
      var icons={image:'🖼',sticker:'✍️',shape:'⬛',svg:'📐'};
      item.innerHTML='<span class="ltype" style="cursor:grab;">⋮⋮</span>'
        +'<span class="ltype">'+(icons[layer.type]||'▫')+'</span>'
        +'<span class="lname">'+layer.name+'</span>'
        +'<span class="layer-del" title="Delete">✕</span>';
      item.onclick=function(e){if(e.target.classList.contains('layer-del')){deleteLayer(layer.id);return;}selectLayer(layer.id);};
      item.addEventListener('dragstart',function(e){
        e.dataTransfer.effectAllowed='move';
        e.dataTransfer.setData('text/plain',String(layer.id));
        item.style.opacity='0.4';
      });
      item.addEventListener('dragend',function(){item.style.opacity='';document.querySelectorAll('.layer-item').forEach(function(x){x.style.borderTop='';x.style.borderBottom='';});});
      item.addEventListener('dragover',function(e){
        e.preventDefault();e.dataTransfer.dropEffect='move';
        // Show indicator of whether we'd drop above or below
        var bds=item.getBoundingClientRect();var midY=bds.top+bds.height/2;
        document.querySelectorAll('.layer-item').forEach(function(x){x.style.borderTop='';x.style.borderBottom='';});
        if(e.clientY<midY){item.style.borderTop='2px solid var(--green)';}
        else{item.style.borderBottom='2px solid var(--green)';}
      });
      item.addEventListener('drop',function(e){
        e.preventDefault();
        var draggedId=+e.dataTransfer.getData('text/plain');
        if(draggedId===layer.id)return;
        var fromIdx=layers.findIndex(function(l){return l.id===draggedId;});
        var toIdx=layers.findIndex(function(l){return l.id===layer.id;});
        if(fromIdx<0||toIdx<0)return;
        var bds=item.getBoundingClientRect();var midY=bds.top+bds.height/2;
        // In the UI, items are rendered in reverse order (topmost first), so "drop above" means higher in array
        var dropAbove=e.clientY<midY;
        // Remove the dragged layer
        var moved=layers.splice(fromIdx,1)[0];
        // Re-find toIdx since splice may have shifted it
        toIdx=layers.findIndex(function(l){return l.id===layer.id;});
        // Insert: "above" in UI means later in array (higher z); "below" in UI means earlier in array
        var insertAt=dropAbove?toIdx+1:toIdx;
        layers.splice(insertAt,0,moved);
        renderLayerList();redraw();
      });
      list.appendChild(item);
    })(layers[i],i);
  }
}

// ── PROPS PANEL ──
function renderProps(){
  var layer=layers.find(function(l){return l.id===selectedId;});
  var el=document.getElementById('propContent');
  if(!layer){el.innerHTML='<div class="alert alert-green">Select or add a layer to edit.</div>';return;}
  if(layer.type==='image')el.innerHTML=buildImageProps(layer);
  else if(layer.type==='sticker')el.innerHTML=buildStickerProps(layer);
  else if(layer.type==='shape')el.innerHTML=buildShapeProps(layer);
  else if(layer.type==='svg')el.innerHTML=buildSvgProps(layer);
  else if(layer.type==='text')el.innerHTML=buildTextProps(layer);
  bindPropEvents(layer);
}

// Paired numeric inputs (e.g. W × H). Emits two inputs whose ids can be bound in bindPropEvents.
function NUMPAIR(label1,id1,val1,label2,id2,val2){

function applyPresetToLayer(layerId,presetId){
  var layer=layers.find(function(l){return l.id==layerId;});
  var preset=gradientPresets.find(function(p){return p.id===presetId;});
  if(!layer||!preset)return;
  snapshotState();
  layer.gradTop=preset.top;layer.gradBottom=preset.bottom;
  activePresetId=presetId;renderPresets();renderProps();redraw();
}

function bindPropEvents(layer){
  function on(id,evt,fn){var e=document.getElementById(id);if(e)e.addEventListener(evt,fn);}
  function rng(id,fn){var e=document.getElementById(id);if(!e)return;e.addEventListener('input',function(){document.getElementById(id+'_v').textContent=e.value;fn(+e.value);});}
  // Numeric input bound to layer prop. Fires on input (every keystroke), and optionally keeps paired range slider in sync.
  function num(id,fn,syncRangeId){
    var e=document.getElementById(id);if(!e)return;
    e.addEventListener('input',function(){
      var v=+e.value;if(isNaN(v))return;
      fn(v);
      if(syncRangeId){
        var r=document.getElementById(syncRangeId);if(r){r.value=v;var rv=document.getElementById(syncRangeId+'_v');if(rv)rv.textContent=v;}
      }
    });
  }

  if(layer.type==='image'){
    num('nx',function(v){layer.x=v;redraw();},'px');
    num('ny',function(v){layer.y=v;redraw();},'py');
    num('nw',function(v){layer.w=v;redraw();},'pw');
    num('nh',function(v){layer.h=v;redraw();},'ph');
    rng('px',function(v){layer.x=v;redraw();});rng('py',function(v){layer.y=v;redraw();});
    rng('pw',function(v){layer.w=v;redraw();});rng('ph',function(v){layer.h=v;redraw();});
    on('pfit','change',function(e){layer.fit=e.target.value;redraw();});
    rng('protation',function(v){layer.rotation=v;redraw();});
    rng('popacity',function(v){layer.opacity=v;redraw();});
    on('pflipH','change',function(e){layer.flipH=e.target.checked;redraw();});
    on('pflipV','change',function(e){layer.flipV=e.target.checked;redraw();});
  } else if(layer.type==='sticker'){
    document.querySelectorAll('.sl_text').forEach(function(el){
      el.addEventListener('input',function(){layer.lines[+el.dataset.li].text=el.value;redraw();});
    });
    layer.lines.forEach(function(_,i){
      rng('sl_size_'+i,function(v){layer.lines[i].size=v;redraw();});
      rng('sl_ox_'+i,function(v){layer.lines[i].offsetX=v;redraw();});
      rng('sl_curve_'+i,function(v){layer.lines[i].curve=v;redraw();});
    });
    on('palign','change',function(e){layer.align=e.target.value;redraw();});
    on('pgradTop','input',function(e){layer.gradTop=e.target.value;redraw();});
    on('pgradBot','input',function(e){layer.gradBottom=e.target.value;redraw();});
    on('pshadowColor','input',function(e){layer.shadowColor=e.target.value;redraw();});
    rng('ppadTop',function(v){layer.padTop=v;redraw();});
    rng('ppadBot',function(v){layer.padBottom=v;redraw();});
    rng('pbleed',function(v){layer.bleed=v;redraw();});
    rng('pshadowOp',function(v){layer.shadowOpacity=v;redraw();});
    rng('pshadowSp',function(v){layer.shadowSpread=v;redraw();});
    rng('plineGap',function(v){layer.lineGap=v===0?999:v;redraw();});
    num('nsx',function(v){layer.x=v;redraw();},'psx');
    num('nsy',function(v){layer.y=v;redraw();},'psy');
    num('nscale',function(v){layer.scale=v/100;redraw();},'pscale');
    rng('psx',function(v){layer.x=v;redraw();});rng('psy',function(v){layer.y=v;redraw();});
    rng('pscale',function(v){layer.scale=v/100;redraw();});
    rng('ptextScale',function(v){layer.textScale=+v;redraw();});
    rng('psrotation',function(v){layer.rotation=v;redraw();});
    rng('psopacity',function(v){layer.opacity=v;redraw();});
  } else if(layer.type==='shape'){
    on('pshFillType','change',function(e){layer.fillType=e.target.value;renderProps();redraw();});
    on('pshGradType','change',function(e){layer.gradType=e.target.value;redraw();});
    on('pshGradTop','input',function(e){
      if(layer.fillType==='solid')layer.fillColor=e.target.value;else layer.gradTop=e.target.value;redraw();
    });
    on('pshGradBot','input',function(e){layer.gradBottom=e.target.value;redraw();});
    rng('pshGradAngle',function(v){layer.gradAngle=v;redraw();});
    on('pshStroke','input',function(e){layer.strokeColor=e.target.value;redraw();});
    rng('pshStrokeW',function(v){layer.strokeWidth=v;redraw();});
    if(layer.shape==='roundrect')rng('pshCorner',function(v){layer.cornerRadius=v;redraw();});
    num('nshx',function(v){layer.x=v;redraw();},'pshx');
    num('nshy',function(v){layer.y=v;redraw();},'pshy');
    num('nshw',function(v){layer.w=v;redraw();},'pshw');
    num('nshh',function(v){layer.h=v;redraw();},'pshh');
    rng('pshx',function(v){layer.x=v;redraw();});rng('pshy',function(v){layer.y=v;redraw();});
    rng('pshw',function(v){layer.w=v;redraw();});rng('pshh',function(v){layer.h=v;redraw();});
    rng('pshrotation',function(v){layer.rotation=v;redraw();});
    rng('pshopacity',function(v){layer.opacity=v;redraw();});
  } else if(layer.type==='svg'){
    num('nsvgx',function(v){layer.x=v;redraw();},'svgx');
    num('nsvgy',function(v){layer.y=v;redraw();},'svgy');
    num('nsvgw',function(v){layer.w=v;redraw();},'svgw');
    num('nsvgh',function(v){layer.h=v;redraw();},'svgh');
    rng('svgx',function(v){layer.x=v;redraw();});rng('svgy',function(v){layer.y=v;redraw();});
    rng('svgw',function(v){layer.w=v;redraw();});rng('svgh',function(v){layer.h=v;redraw();});
    rng('svgrotation',function(v){layer.rotation=v;redraw();});
    rng('svgopacity',function(v){layer.opacity=v;redraw();});
  } else if(layer.type==='text'){
    on('ptxt_text','input',function(e){layer.text=e.target.value;redraw();});
    on('ptxt_family','change',function(e){
      layer.fontFamily=e.target.value;
      // When changing family, reset to that family's first available weight
      var fontList=FONTS_BY_BRAND[currentBrand]||FONTS_BY_BRAND.meowi;
      var f=fontList.find(function(f){return f.family===layer.fontFamily;});
      if(f && f.weights && f.weights.indexOf(layer.fontWeight)===-1) layer.fontWeight=f.weights[0];
      renderProps(); redraw();
    });
    on('ptxt_weight','change',function(e){layer.fontWeight=+e.target.value;redraw();});
    on('ptxt_color','input',function(e){layer.color=e.target.value;redraw();});
    on('ptxt_align','change',function(e){layer.align=e.target.value;redraw();});
    rng('ptxt_size',function(v){layer.fontSize=v;redraw();});
    rng('ptxt_lineh',function(v){layer.lineHeight=v/100;redraw();});
    rng('ptxt_ls',function(v){layer.letterSpacing=+v;redraw();});
    num('ntxtx',function(v){layer.x=v;redraw();},'ptxt_x');
    num('ntxty',function(v){layer.y=v;redraw();},'ptxt_y');
    num('ntxtw',function(v){layer.w=v;redraw();},'ptxt_w');
    num('ntxth',function(v){layer.h=v;redraw();});
    rng('ptxt_x',function(v){layer.x=v;redraw();});
    rng('ptxt_y',function(v){layer.y=v;redraw();});
    rng('ptxt_w',function(v){layer.w=v;redraw();});
    rng('ptxt_rot',function(v){layer.rotation=v;redraw();});
    rng('ptxt_opacity',function(v){layer.opacity=v;redraw();});
  }
}

function addStickerLine(id){
  var l=layers.find(function(x){return x.id===id;});if(!l)return;
  snapshotState();
  l.lines.push({text:'MORE TEXT',size:80,offsetX:0,curve:0});renderProps();redraw();
}
function removeStickerLine(id,i){
  var l=layers.find(function(x){return x.id===id;});if(!l||l.lines.length<=1)return;
  snapshotState();
  l.lines.splice(i,1);renderProps();redraw();
}

// ── IMAGE UPLOAD ──
function promptImageUpload(layerId){
  var fi=document.getElementById('fi_'+layerId);
  if(fi){fi.click();return;}
  var input=document.createElement('input');input.type='file';input.accept='image/*';
  input.onchange=function(e){handleFileInput(e,layerId);};input.click();
}
function handleFileInput(e,layerId){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var l=layers.find(function(x){return x.id===layerId;});
      if(l){l.img=img;l.name=file.name.replace(/\.[^.]+$/,'');l.w=canvasW;l.h=canvasH;l.x=0;l.y=0;renderLayerList();renderProps();redraw();}
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── DRAG & DROP FILES ──
function bindDrop(){
  var wrap=document.getElementById('canvasWrap');
  wrap.addEventListener('dragover',function(e){e.preventDefault();wrap.classList.add('drag-over');});
  wrap.addEventListener('dragleave',function(){wrap.classList.remove('drag-over');});
  wrap.addEventListener('drop',function(e){
    e.preventDefault();wrap.classList.remove('drag-over');
    Array.from(e.dataTransfer.files).forEach(function(file){
      if(file.type==='image/svg+xml'||file.name.endsWith('.svg')){
        var reader=new FileReader();
        reader.onload=function(ev){
          var blob=new Blob([ev.target.result],{type:'image/svg+xml'});
          var url=URL.createObjectURL(blob);
          var img=new Image();img.onload=function(){
            var id=nextId++;
            layers.push({id:id,type:'svg',name:file.name.replace('.svg',''),img:img,url:url,
              x:canvasW*0.1,y:canvasH*0.1,w:img.naturalWidth||canvasW*0.8,h:img.naturalHeight||canvasH*0.8,
              opacity:100,rotation:0});
            selectLayer(id);renderLayerList();redraw();
          };img.src=url;
        };reader.readAsText(file);
      } else if(file.type.startsWith('image/')){
        var reader=new FileReader();
        reader.onload=function(ev){
          var img=new Image();img.onload=function(){addImageLayer(img,file.name.replace(/\.[^.]+$/,''));};
          img.src=ev.target.result;
        };reader.readAsDataURL(file);
      }
    });
  });
}

// ── CANVAS MOUSE EVENTS (drag + resize) ──
var HANDLE_SIZE=12;
var ROTATE_HANDLE_DIST=28; // distance in canvas pixels from layer top edge to rotation handle center
function bindCanvasEvents(){
  var wrap=document.getElementById('canvasWrap');
  wrap.addEventListener('mousedown',function(e){
    var rect=wrap.getBoundingClientRect();
    var cx=(e.clientX-rect.left)/zoomLevel,cy=(e.clientY-rect.top)/zoomLevel;
    // Crop mode takes precedence — handle drags adjust the crop rect
    if(cropState){
      var handle=hitCropHandle(cx,cy);
      if(handle){
        cropState.dragHandle=handle;
        e.preventDefault();
      }
      return; // in crop mode, no layer selection / drag / resize
    }
    // First check: is there a selected layer with handles nearby?
    // Because the layer may be rotated, we transform the click into layer-local coords
    // (the coord space the handles are drawn in pre-rotation).
    var selLayer=layers.find(function(l){return l.id===selectedId;});
    if(selLayer){
      var sbds=getLayerBounds(selLayer);
      var rot=(selLayer.rotation||0)*Math.PI/180;
      var ccx=sbds.x+sbds.w/2, ccy=sbds.y+sbds.h/2;
      // rotate (cx,cy) by -rot around (ccx,ccy) to get local coords
      var dx=cx-ccx, dy=cy-ccy;
      var cs=Math.cos(-rot), sn=Math.sin(-rot);
      var lcx=ccx+dx*cs-dy*sn, lcy=ccy+dx*sn+dy*cs;
      var hitR=(HANDLE_SIZE*1.5)/zoomLevel;

      // Rotation handle (above top-center in local space)
      var rhx=sbds.x+sbds.w/2, rhy=sbds.y-ROTATE_HANDLE_DIST;
      if(Math.abs(lcx-rhx)<hitR && Math.abs(lcy-rhy)<hitR){
        snapshotState();
        rotateState={layerId:selLayer.id, ccx:ccx, ccy:ccy, origRotation:selLayer.rotation||0, startAngleRad:Math.atan2(cy-ccy, cx-ccx)};
        e.preventDefault();
        return;
      }
      // Resize handle (bottom-right corner in local space)
      var shx=sbds.x+sbds.w, shy=sbds.y+sbds.h;
      if(Math.abs(lcx-shx)<hitR && Math.abs(lcy-shy)<hitR){
        snapshotState();
        resizeState={layerId:selLayer.id,startX:e.clientX,startY:e.clientY,origW:sbds.w,origH:sbds.h,aspect:sbds.w/sbds.h,origScale:selLayer.scale||1};
        e.preventDefault();
        return;
      }
    }
    var layer=getLayerAt(cx,cy);
    if(!layer)return;
    selectLayer(layer.id);
    snapshotState();
    dragState={layerId:layer.id,startX:e.clientX,startY:e.clientY,origX:layer.x,origY:layer.y};
    e.preventDefault();
  });
  window.addEventListener('mousemove',function(e){
    if(cropState && cropState.dragHandle){
      var rect=wrap.getBoundingClientRect();
      var cx=(e.clientX-rect.left)/zoomLevel, cy=(e.clientY-rect.top)/zoomLevel;
      updateCropHandle(cropState.dragHandle, cx, cy);
      return;
    }
    if(rotateState){
      var layer=layers.find(function(l){return l.id===rotateState.layerId;}); if(!layer) return;
      var rect=wrap.getBoundingClientRect();
      var cx=(e.clientX-rect.left)/zoomLevel, cy=(e.clientY-rect.top)/zoomLevel;
      var currentAngle=Math.atan2(cy-rotateState.ccy, cx-rotateState.ccx);
      var delta=(currentAngle-rotateState.startAngleRad)*180/Math.PI;
      var newRot=rotateState.origRotation+delta;
      // Snap to 15° increments when Shift held
      if(e.shiftKey) newRot=Math.round(newRot/15)*15;
      // Normalize to [-180, 180]
      newRot=((newRot+540)%360)-180;
      layer.rotation=newRot;
      // sync slider if present
      var slider=document.getElementById(layer.type==='shape'?'pshrotation':layer.type==='svg'?'svgrotation':layer.type==='sticker'?'prot':'protation');
      if(slider){slider.value=Math.round(newRot); var v=document.getElementById(slider.id+'_v'); if(v) v.textContent=Math.round(newRot);}
      redraw();
      return;
    }
    if(dragState){
      var layer=layers.find(function(l){return l.id===dragState.layerId;});if(!layer)return;
      layer.x=Math.round(dragState.origX+(e.clientX-dragState.startX)/zoomLevel);
      layer.y=Math.round(dragState.origY+(e.clientY-dragState.startY)/zoomLevel);
      syncPropXY(layer);redraw();
    }
    if(resizeState){
      var layer=layers.find(function(l){return l.id===resizeState.layerId;});if(!layer)return;
      var dw=(e.clientX-resizeState.startX)/zoomLevel;
      var dh=(e.clientY-resizeState.startY)/zoomLevel;
      if(layer.type==='sticker'){
        var newW=Math.max(40,resizeState.origW+dw);
        layer.scale=Math.max(0.1,Math.min(3,newW/(canvasW)));
        var ps=document.getElementById('pscale');if(ps){ps.value=Math.round(layer.scale*100);var v=document.getElementById('pscale_v');if(v)v.textContent=ps.value;}
      } else {
        var nw=Math.max(10,resizeState.origW+dw);
        var nh=e.shiftKey?nw/resizeState.aspect:Math.max(10,resizeState.origH+dh);
        layer.w=Math.round(nw);layer.h=Math.round(nh);
        syncPropWH(layer);
      }
      redraw();
    }
  });
  window.addEventListener('mouseup',function(){
    dragState=null;resizeState=null;rotateState=null;
    if(cropState) cropState.dragHandle=null;
  });
}

function getLayerAt(cx,cy){
  for(var i=layers.length-1;i>=0;i--){
    var bds=getLayerBounds(layers[i]);
    if(cx>=bds.x&&cx<=bds.x+bds.w&&cy>=bds.y&&cy<=bds.y+bds.h)return layers[i];
  }return null;
}
function getLayerBounds(layer){
  if(layer.type==='sticker'){
    var sc=layer.scale||1;
    var w=canvasW*sc;
    // Match drawStickerLayer's totalH formula so the box fits the drawn sticker
    var lines=layer.lines.filter(function(l){return l.text&&l.text.trim();});
    if(!lines.length)return{x:layer.x,y:layer.y,w:w,h:(layer.padTop+layer.padBottom)*sc};
    var _ts=(layer.textScale!==undefined&&layer.textScale!==100)?(layer.textScale/100):1;
    var sizes=lines.map(function(l){return Math.max(12,Math.round(l.size*_ts));});
    var avgSz=sizes.reduce(function(s,x){return s+x;},0)/sizes.length;
    var bleed=layer.bleed;
    var outScale=(!isNaN(bleed)&&bleed>0)?(bleed/100):0.22;
    var shadow=Math.max(2,Math.round(avgSz*0.06));
    var sdy=Math.max(2,Math.round(avgSz*0.08));
    var textH=sizes.reduce(function(s,x){return s+x;},0);
    // Add inter-line gaps (approx, matches buildRows default behavior when lineGap is default)
    var lgr=layer.lineGap===999||layer.lineGap===undefined?NaN:layer.lineGap;
    for(var i=0;i<sizes.length-1;i++){
      var avg2=(sizes[i]+sizes[i+1])/2;
      var gap=!isNaN(lgr)&&lgr!==0?lgr*(avg2/60):(avg2>=80?avg2*-0.10:avg2*0.12);
      textH+=gap;
    }
    var totalH=(layer.padTop||40)+textH+(layer.padBottom||40)+sdy+Math.ceil(shadow*2)+8;
    return{x:layer.x,y:layer.y,w:w,h:totalH*sc};
  }
  if(layer.type==='text'){
    // Height is whatever the last render produced. Falls back to the stored h or font-based estimate.
    var h = layer._renderedH || layer.h || (layer.fontSize||72) * (layer.lineHeight||1.2);
    return {x:layer.x, y:layer.y, w:layer.w, h:h};
  }
  return{x:layer.x,y:layer.y,w:layer.w||100,h:layer.h||100};
}
function syncPropXY(l){
  var px=document.getElementById(l.type==='sticker'?'psx':l.type==='shape'?'pshx':l.type==='svg'?'svgx':l.type==='text'?'ptxt_x':'px');
  var py=document.getElementById(l.type==='sticker'?'psy':l.type==='shape'?'pshy':l.type==='svg'?'svgy':l.type==='text'?'ptxt_y':'py');
  if(px)px.value=l.x;if(py)py.value=l.y;
  var nxId=l.type==='sticker'?'nsx':l.type==='shape'?'nshx':l.type==='svg'?'nsvgx':l.type==='text'?'ntxtx':'nx';
  var nyId=l.type==='sticker'?'nsy':l.type==='shape'?'nshy':l.type==='svg'?'nsvgy':l.type==='text'?'ntxty':'ny';
  var nx=document.getElementById(nxId),ny=document.getElementById(nyId);
  if(nx)nx.value=Math.round(l.x);if(ny)ny.value=Math.round(l.y);
}
function syncPropWH(l){
  var pw=document.getElementById(l.type==='shape'?'pshw':l.type==='svg'?'svgw':l.type==='text'?'ptxt_w':'pw');
  var ph=document.getElementById(l.type==='shape'?'pshh':l.type==='svg'?'svgh':'ph');
  if(pw)pw.value=l.w;if(ph)ph.value=l.h;
  var nwId=l.type==='shape'?'nshw':l.type==='svg'?'nsvgw':l.type==='text'?'ntxtw':'nw';
  var nhId=l.type==='shape'?'nshh':l.type==='svg'?'nsvgh':l.type==='text'?'ntxth':'nh';
  var nw=document.getElementById(nwId),nh=document.getElementById(nhId);
  if(nw)nw.value=Math.round(l.w);if(nh)nh.value=Math.round(l.h);
}

// ── REDRAW ──
function redraw(){
  var canvas=document.getElementById('mainCanvas');
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvasW,canvasH);
  drawCheckerboard(ctx);
  layers.forEach(function(layer){
    ctx.save();ctx.globalAlpha=(layer.opacity||100)/100;
    if(layer.type==='image')drawImageLayer(ctx,layer);
    else if(layer.type==='sticker')drawStickerLayer(ctx,layer);
    else if(layer.type==='shape')drawShapeLayer(ctx,layer);
    else if(layer.type==='svg')drawSvgLayer(ctx,layer);
    else if(layer.type==='text')drawTextLayer(ctx,layer);
    ctx.restore();
  });
  // draw selection outline + resize handle (but NOT during crop mode — crop has its own overlay)
  var sel=layers.find(function(l){return l.id===selectedId;});
  if(sel && !cropState){
    var bds=getLayerBounds(sel);
    var rot=(sel.rotation||0)*Math.PI/180;
    var ccx=bds.x+bds.w/2, ccy=bds.y+bds.h/2; // rotation center
    ctx.save();
    // Draw rotated dashed outline + handles
    ctx.translate(ccx,ccy); ctx.rotate(rot); ctx.translate(-ccx,-ccy);
    ctx.strokeStyle='rgba(138,184,29,0.8)';ctx.lineWidth=2;ctx.setLineDash([6,3]);
    ctx.strokeRect(bds.x,bds.y,bds.w,bds.h);ctx.setLineDash([]);
    // resize handle at bottom-right corner
    ctx.fillStyle='#fff';ctx.strokeStyle='#8ab81d';ctx.lineWidth=2;
    ctx.fillRect(bds.x+bds.w-HANDLE_SIZE/2,bds.y+bds.h-HANDLE_SIZE/2,HANDLE_SIZE,HANDLE_SIZE);
    ctx.strokeRect(bds.x+bds.w-HANDLE_SIZE/2,bds.y+bds.h-HANDLE_SIZE/2,HANDLE_SIZE,HANDLE_SIZE);
    // rotation handle: circle above the top-center, connected by a short line
    var rhX=bds.x+bds.w/2, rhY=bds.y-ROTATE_HANDLE_DIST;
    ctx.beginPath();ctx.moveTo(bds.x+bds.w/2,bds.y);ctx.lineTo(rhX,rhY);ctx.stroke();
    ctx.beginPath();ctx.arc(rhX,rhY,HANDLE_SIZE/2+1,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.stroke();
    ctx.restore();
  }
  if(cropState) drawCropOverlay(ctx);
}

// ── CROP MODE ──
// cropState.cropX/Y/W/H are in SOURCE-IMAGE pixel coordinates.
// We map them to/from canvas-space (the displayed layer rect) via the layer's w/h and the image's natural size.

function enterCropMode(layerId){
  var layer=layers.find(function(l){return l.id===layerId;});
  if(!layer || !layer.img) return;
  var nw=layer.img.naturalWidth, nh=layer.img.naturalHeight;
  cropState={
    layerId: layer.id,
    cropX: layer.cropX!=null?layer.cropX:0,
    cropY: layer.cropY!=null?layer.cropY:0,
    cropW: layer.cropW!=null?layer.cropW:nw,
    cropH: layer.cropH!=null?layer.cropH:nh,
    dragHandle: null,
    natW: nw,
    natH: nh
  };
  showCropToolbar();
  redraw();
}

function exitCropMode(){
  cropState=null;
  hideCropToolbar();
  redraw();
}

function confirmCrop(){
  if(!cropState)return;
  var layer=layers.find(function(l){return l.id===cropState.layerId;});
  if(layer){
    snapshotState();
    layer.cropX=Math.round(cropState.cropX);
    layer.cropY=Math.round(cropState.cropY);
    layer.cropW=Math.round(cropState.cropW);
    layer.cropH=Math.round(cropState.cropH);
  }
  exitCropMode();
  renderProps();
}

function clearCrop(layerId){
  var layer=layers.find(function(l){return l.id===layerId;});
  if(!layer)return;
  snapshotState();
  delete layer.cropX; delete layer.cropY; delete layer.cropW; delete layer.cropH;
  renderProps(); redraw();
}

// Map crop rect from source-image coords to canvas-space (the rectangle on the canvas where
// that cropped region currently appears, based on the layer's displayed x/y/w/h).
// For now we treat the crop rect as showing within the layer's displayed bounds proportionally.
function cropSourceToCanvas(layer){
  // The layer is displayed at (layer.x, layer.y, layer.w, layer.h).
  // We'll show the crop rectangle as a sub-rectangle of the displayed area, proportional to the source crop rect.
  var nw=cropState.natW, nh=cropState.natH;
  var sxFrac=cropState.cropX/nw, syFrac=cropState.cropY/nh;
  var swFrac=cropState.cropW/nw, shFrac=cropState.cropH/nh;
  return {
    x: layer.x + sxFrac*layer.w,
    y: layer.y + syFrac*layer.h,
    w: swFrac*layer.w,
    h: shFrac*layer.h
  };
}

function drawCropOverlay(ctx){
  var layer=layers.find(function(l){return l.id===cropState.layerId;});
  if(!layer)return;
  ctx.save();
  // Dim everything outside the crop rect
  var r=cropSourceToCanvas(layer);
  ctx.fillStyle='rgba(0,0,0,0.45)';
  // Dim outside of crop rect (within the layer's bounds)
  ctx.beginPath();
  ctx.rect(layer.x, layer.y, layer.w, layer.h);
  ctx.rect(r.x+r.w, r.y, -r.w, r.h); // counter-clockwise inner → acts as hole
  ctx.fill('evenodd');

  // Crop rect border
  ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.setLineDash([8,4]);
  ctx.strokeRect(r.x, r.y, r.w, r.h);
  ctx.setLineDash([]);

  // Draw 8 handles (4 corners + 4 midpoints)
  var handles=getCropHandles(r);
  ctx.fillStyle='#fff';ctx.strokeStyle='#8ab81d';ctx.lineWidth=2;
  Object.keys(handles).forEach(function(k){
    var h=handles[k];
    ctx.fillRect(h.x-HANDLE_SIZE/2, h.y-HANDLE_SIZE/2, HANDLE_SIZE, HANDLE_SIZE);
    ctx.strokeRect(h.x-HANDLE_SIZE/2, h.y-HANDLE_SIZE/2, HANDLE_SIZE, HANDLE_SIZE);
  });
  ctx.restore();
}

function getCropHandles(r){
  return {
    nw: {x: r.x,         y: r.y         },
    n:  {x: r.x + r.w/2, y: r.y         },
    ne: {x: r.x + r.w,   y: r.y         },
    e:  {x: r.x + r.w,   y: r.y + r.h/2 },
    se: {x: r.x + r.w,   y: r.y + r.h   },
    s:  {x: r.x + r.w/2, y: r.y + r.h   },
    sw: {x: r.x,         y: r.y + r.h   },
    w:  {x: r.x,         y: r.y + r.h/2 }
  };
}

function hitCropHandle(cx, cy){
  if(!cropState)return null;
  var layer=layers.find(function(l){return l.id===cropState.layerId;});
  if(!layer)return null;
  var r=cropSourceToCanvas(layer);
  var handles=getCropHandles(r);
  var hitR=(HANDLE_SIZE*1.5)/zoomLevel;
  var found=null;
  Object.keys(handles).forEach(function(k){
    var h=handles[k];
    if(Math.abs(cx-h.x)<hitR && Math.abs(cy-h.y)<hitR) found=k;
  });
  return found;
}

function updateCropHandle(handle, cx, cy){
  var layer=layers.find(function(l){return l.id===cropState.layerId;});
  if(!layer)return;
  // Convert canvas coord (cx,cy) back to source-image coord
  var fx=(cx-layer.x)/layer.w;
  var fy=(cy-layer.y)/layer.h;
  var sx=fx*cropState.natW;
  var sy=fy*cropState.natH;
  sx=Math.max(0,Math.min(cropState.natW,sx));
  sy=Math.max(0,Math.min(cropState.natH,sy));
  var cx0=cropState.cropX, cy0=cropState.cropY;
  var cx1=cropState.cropX+cropState.cropW, cy1=cropState.cropY+cropState.cropH;
  var minSize=20; // min crop rect dimension in source pixels
  if(handle.indexOf('w')>=0) cx0=Math.min(sx, cx1-minSize);
  if(handle.indexOf('e')>=0) cx1=Math.max(sx, cx0+minSize);
  if(handle.indexOf('n')>=0) cy0=Math.min(sy, cy1-minSize);
  if(handle.indexOf('s')>=0) cy1=Math.max(sy, cy0+minSize);
  cropState.cropX=cx0; cropState.cropY=cy0;
  cropState.cropW=cx1-cx0; cropState.cropH=cy1-cy0;
  redraw();
}

function showCropToolbar(){
  var bar=document.getElementById('cropToolbar');
  if(!bar){
    bar=document.createElement('div');
    bar.id='cropToolbar';
    bar.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 16px;border-radius:8px;display:flex;gap:10px;align-items:center;z-index:900;box-shadow:0 4px 16px rgba(0,0,0,0.4);font-size:13px;';
    bar.innerHTML='<span style="opacity:0.85;">Crop mode — drag handles to adjust</span>'
      +'<button onclick="confirmCrop()" style="background:#8ab81d;color:#fff;border:none;padding:6px 14px;border-radius:5px;cursor:pointer;font-weight:600;">✓ Apply</button>'
      +'<button onclick="exitCropMode()" style="background:#555;color:#fff;border:none;padding:6px 14px;border-radius:5px;cursor:pointer;">✕ Cancel</button>';
    document.body.appendChild(bar);
  }
  bar.style.display='flex';
}
function hideCropToolbar(){
  var bar=document.getElementById('cropToolbar');
  if(bar) bar.style.display='none';
}

function drawCheckerboard(ctx){
  var sz=28;
  for(var y=0;y<canvasH;y+=sz)for(var x=0;x<canvasW;x+=sz){
    ctx.fillStyle=(Math.floor(x/sz)+Math.floor(y/sz))%2===0?'#e8e8e0':'#d8d8d0';
    ctx.fillRect(x,y,sz,sz);
  }
}

function withRotation(ctx,layer,fn){
  if(!layer.rotation){fn();return;}
  var bds=getLayerBounds(layer);
  var cx=bds.x+bds.w/2,cy=bds.y+bds.h/2;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(layer.rotation*Math.PI/180);ctx.translate(-cx,-cy);fn();ctx.restore();
}

// ── DRAW TEXT LAYER ──
// Renders a text block with word-wrap within the layer's width.
// Respects font, weight, size, color, alignment, line-height, letter-spacing, opacity, rotation.
function drawTextLayer(ctx, layer){
  if(!layer.text) return;
  withRotation(ctx, layer, function(){
    var x=layer.x, y=layer.y, w=layer.w;
    var size=layer.fontSize||72;
    var weight=layer.fontWeight||400;
    var family=layer.fontFamily||'sans-serif';
    var align=layer.align||'left';
    var lineHeight=(layer.lineHeight||1.2);
    var letterSpacing=(layer.letterSpacing||0);

    ctx.save();
    ctx.fillStyle=layer.color||'#222';
    ctx.font=weight+' '+size+'px '+family+', sans-serif';
    ctx.textBaseline='top';
    // Canvas 2D has no native letterSpacing; we handle it manually by drawing char by char when nonzero
    var useManualKerning = Math.abs(letterSpacing) > 0.01;

    // Word-wrap: split input into paragraphs (keep explicit \n), then wrap each to the layer width
    var paragraphs = String(layer.text).split('\n');
    var lines = [];
    paragraphs.forEach(function(p){
      if(p.length===0){ lines.push(''); return; }
      var words = p.split(' ');
      var cur = '';
      words.forEach(function(word){
        var test = cur ? cur+' '+word : word;
        var testW = measureTextWithSpacing(ctx, test, letterSpacing);
        if(testW > w && cur){
          lines.push(cur);
          cur = word;
        } else {
          cur = test;
        }
      });
      if(cur) lines.push(cur);
    });

    var lineH = size*lineHeight;
    ctx.textAlign = (align==='center')?'center':(align==='right')?'right':'left';

    lines.forEach(function(line, i){
      var drawX = x;
      if(align==='center') drawX = x + w/2;
      else if(align==='right') drawX = x + w;
      var drawY = y + i*lineH;
      if(useManualKerning){
        drawTextWithLetterSpacing(ctx, line, drawX, drawY, letterSpacing, align, w);
      } else {
        ctx.fillText(line, drawX, drawY);
      }
    });

    // Track the actual rendered height on the layer so bounds/selection match
    layer._renderedH = lines.length * lineH;
    ctx.restore();
  });
}

// Measures text width including per-character letter spacing
function measureTextWithSpacing(ctx, text, letterSpacing){
  var base = ctx.measureText(text).width;
  if(!letterSpacing) return base;
  // (text.length - 1) gaps between characters
  return base + Math.max(0, text.length - 1) * letterSpacing;
}

function drawTextWithLetterSpacing(ctx, text, x, y, letterSpacing, align, boxW){
  // For letter-spacing we need to draw char by char. Compute the total width first, then start position based on align.
  var totalW = measureTextWithSpacing(ctx, text, letterSpacing);
  var cursor;
  if(align==='center') cursor = x - totalW/2;
  else if(align==='right') cursor = x - totalW;
  else cursor = x;
  // Force left alignment for character-by-character draw
  var savedAlign = ctx.textAlign;
  ctx.textAlign = 'left';
  for(var i=0; i<text.length; i++){
    var ch = text[i];
    ctx.fillText(ch, cursor, y);
    cursor += ctx.measureText(ch).width + letterSpacing;
  }
  ctx.textAlign = savedAlign;
}

function drawImageLayer(ctx,layer){
  if(!layer.img)return;
  withRotation(ctx,layer,function(){
    var img=layer.img,x=layer.x,y=layer.y,w=layer.w,h=layer.h;
    // Crop source rectangle defaults to full image
    var sx=(layer.cropX!=null)?layer.cropX:0;
    var sy=(layer.cropY!=null)?layer.cropY:0;
    var sw=(layer.cropW!=null)?layer.cropW:img.naturalWidth;
    var sh=(layer.cropH!=null)?layer.cropH:img.naturalHeight;
    ctx.save();ctx.beginPath();ctx.rect(x,y,w,h);ctx.clip();
    if(layer.flipH||layer.flipV){ctx.translate(x+w/2,y+h/2);ctx.scale(layer.flipH?-1:1,layer.flipV?-1:1);ctx.translate(-(x+w/2),-(y+h/2));}
    if(layer.fit==='fill'){ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);}
    else{
      var scale=layer.fit==='cover'?Math.max(w/sw,h/sh):Math.min(w/sw,h/sh);
      var dw=sw*scale,dh=sh*scale,dx=x+(w-dw)/2,dy=y+(h-dh)/2;
      ctx.drawImage(img,sx,sy,sw,sh,dx,dy,dw,dh);
    }
    ctx.restore();
  });
}

function drawSvgLayer(ctx,layer){
  if(!layer.img)return;
  withRotation(ctx,layer,function(){
    var img=layer.img,x=layer.x,y=layer.y,w=layer.w,h=layer.h;
    var sx=(layer.cropX!=null)?layer.cropX:0;
    var sy=(layer.cropY!=null)?layer.cropY:0;
    var sw=(layer.cropW!=null)?layer.cropW:img.naturalWidth;
    var sh=(layer.cropH!=null)?layer.cropH:img.naturalHeight;
    ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);
  });
}

function drawShapeLayer(ctx,layer){
  withRotation(ctx,layer,function(){
    var x=layer.x,y=layer.y,w=layer.w,h=layer.h;
    // build fill
    var fill;
    if(layer.fillType==='solid'){
      fill=layer.fillColor||'#8ab81d';
    } else {
      var gradType = layer.gradType || 'linear';
      var cx2=x+w/2, cy2=y+h/2;
      var top = layer.gradTop||'#8ab81d';
      var bot = layer.gradBottom||'#3c8e14';
      var grad;
      if(gradType === 'radial'){
        var rad = Math.max(w,h)/2;
        grad = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, rad);
        grad.addColorStop(0, top);
        grad.addColorStop(1, bot);
      } else if(gradType === 'conic' && ctx.createConicGradient){
        var angRad = ((layer.gradAngle||0) - 90) * Math.PI/180;  // start at top like CSS conic-gradient
        grad = ctx.createConicGradient(angRad, cx2, cy2);
        grad.addColorStop(0, top);
        grad.addColorStop(1, bot);
      } else {
        // linear (default)
        var ang=(layer.gradAngle||135)*Math.PI/180;
        var len=Math.sqrt(w*w+h*h)/2;
        var gx1=cx2-Math.cos(ang)*len, gy1=cy2-Math.sin(ang)*len;
        var gx2=cx2+Math.cos(ang)*len, gy2=cy2+Math.sin(ang)*len;
        grad = ctx.createLinearGradient(gx1,gy1,gx2,gy2);
        grad.addColorStop(0, top);
        grad.addColorStop(1, bot);
      }
      fill=grad;
    }
    ctx.save();
    ctx.fillStyle=fill;
    if(layer.strokeWidth>0){ctx.strokeStyle=layer.strokeColor||'#000';ctx.lineWidth=layer.strokeWidth;}
    ctx.beginPath();
    switch(layer.shape){
      case 'rect':ctx.rect(x,y,w,h);break;
      case 'roundrect':var r=Math.min(layer.cornerRadius||32,w/2,h/2);ctx.roundRect(x,y,w,h,r);break;
      case 'circle':ctx.ellipse(x+w/2,y+h/2,w/2,h/2,0,0,Math.PI*2);break;
      case 'triangle':ctx.moveTo(x+w/2,y);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.closePath();break;
      case 'diamond':ctx.moveTo(x+w/2,y);ctx.lineTo(x+w,y+h/2);ctx.lineTo(x+w/2,y+h);ctx.lineTo(x,y+h/2);ctx.closePath();break;
      case 'star':drawStar(ctx,x+w/2,y+h/2,5,Math.min(w,h)/2,Math.min(w,h)/4);break;
      case 'starburst':drawStar(ctx,x+w/2,y+h/2,12,Math.min(w,h)/2,Math.min(w,h)/3);break;
      case 'hexagon':drawPolygon(ctx,x+w/2,y+h/2,6,Math.min(w,h)/2);break;
      default:ctx.rect(x,y,w,h);
    }
    ctx.fill();
    if(layer.strokeWidth>0)ctx.stroke();
    ctx.restore();
  });
}

function drawStar(ctx,cx,cy,points,outer,inner){
  ctx.moveTo(cx,cy-outer);
  for(var i=0;i<points*2;i++){
    var r=i%2===0?outer:inner;
    var a=(Math.PI/points)*i-Math.PI/2;
    ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
  }
  ctx.closePath();
}
function drawPolygon(ctx,cx,cy,sides,r){
  ctx.moveTo(cx+r*Math.cos(-Math.PI/2),cy+r*Math.sin(-Math.PI/2));
  for(var i=1;i<=sides;i++){var a=(2*Math.PI/sides)*i-Math.PI/2;ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}
  ctx.closePath();
}

// ── BUBBLE STICKER DRAW ──
function drawStickerLayer(ctx,layer){
  var lines=layer.lines.filter(function(l){return l.text&&l.text.trim();});
  if(!lines.length)return;
  var _ts=(layer.textScale!==undefined&&layer.textScale!==100)?(layer.textScale/100):1;
  if(_ts!==1)lines=lines.map(function(l){return{text:l.text,size:Math.max(12,Math.round(l.size*_ts)),offsetX:l.offsetX,curve:l.curve};});
  var align=layer.align||'left';
  var TOP=layer.padTop||40,BOT=layer.padBottom||40;
  var gradTop=layer.gradTop||'#8ab81d',gradBot=layer.gradBottom||'#3c8e14';
  var lgr=layer.lineGap===999||layer.lineGap===undefined?NaN:layer.lineGap;
  var hex=(layer.shadowColor||'#1a4d00').replace('#','');
  if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var sr=parseInt(hex.substring(0,2),16),sg=parseInt(hex.substring(2,4),16),sb=parseInt(hex.substring(4,6),16);
  var sop=(layer.shadowOpacity||45)/100,ssp=(layer.shadowSpread||10)/10;
  var shColor='rgba('+sr+','+sg+','+sb+','+sop+')';
  var avgSz=lines.reduce(function(s,l){return s+l.size;},0)/lines.length;
  var bleed=layer.bleed;
  var outScale=(!isNaN(bleed)&&bleed>0)?(bleed/100):0.22;
  var outline=Math.max(6,Math.round(avgSz*outScale));
  var shadow=Math.max(2,Math.round(avgSz*0.06));
  var sdx=Math.max(1,Math.round(avgSz*0.04)),sdy=Math.max(2,Math.round(avgSz*0.08));
  var strokeBleed=Math.ceil(outline*1.5)+sdx+Math.ceil(shadow)+8;
  var edgeR=strokeBleed;
  var sc=layer.scale||1,cw=canvasW*sc,maxW=cw-strokeBleed*2;
  // Horizontal pad for the off-screen canvas so text pushed past edges via offsetX still renders
  var HPAD = Math.round(cw);   // pad both sides by a full canvas width (supports offsetX in range ±canvasW)
  var FONT='normal {S}px CooperBlack, serif';
  var tmp=document.createElement('canvas'),tctx=tmp.getContext('2d');
  function meas(t,s){tctx.font=FONT.replace('{S}',s);return tctx.measureText(t).width;}
  lines=lines.map(function(l){
    var sf=1;l.text.split(' ').forEach(function(w){var ww=meas(w,l.size);if(ww>maxW)sf=Math.min(sf,maxW/ww);});
    return sf<1?{text:l.text,size:Math.max(12,Math.floor(l.size*sf)),offsetX:l.offsetX,curve:l.curve}:l;
  });
  avgSz=lines.reduce(function(s,l){return s+l.size;},0)/lines.length;
  outline=Math.max(6,Math.round(avgSz*outScale));shadow=Math.max(2,Math.round(avgSz*0.06));
  sdx=Math.max(1,Math.round(avgSz*0.04));sdy=Math.max(2,Math.round(avgSz*0.08));
  function wrap(txt,sz){var words=txt.split(' '),rows=[],cur='';
    words.forEach(function(w){var t=cur?cur+' '+w:w;if(meas(t,sz)>maxW&&cur){rows.push(cur);cur=w;}else cur=t;});
    if(cur)rows.push(cur);return rows;}
  function buildRows(){var rows=[];
    lines.forEach(function(line,li){
      wrap(line.text,line.size).forEach(function(r){rows.push({text:r,size:line.size,offsetX:line.offsetX||0,curve:line.curve||0});});
      if(li<lines.length-1){var nxt=lines[li+1].size,avg2=(line.size+nxt)/2;
        var gap=!isNaN(lgr)&&lgr!==0?lgr*(avg2/60):(avg2>=80?avg2*-0.10:avg2*0.12);rows.push({gap:gap});}
    });return rows;}
  var allRows=buildRows();
  var textH=0;allRows.forEach(function(r){textH+=r.gap!==undefined?r.gap:r.size;});
  var rowPos=[],y=TOP;
  allRows.forEach(function(r){if(r.gap!==undefined){y+=r.gap;return;}y+=r.size;rowPos.push({row:r,y:y});});
  var totalH=TOP+textH+BOT+sdy+Math.ceil(shadow*2)+8;
  // Vertical padding: curved text arcs above/below its baseline by up to ~text-width.
  // Pad generously so high curve values don't clip. Use the max line size as heuristic.
  var maxLineSize = rowPos.reduce(function(m,rp){return Math.max(m, rp.row.size||0);}, 0) || 0;
  var VPAD = Math.round(Math.max(maxLineSize * 3, 200));
  function getX(r){if(align==='center')return HPAD+cw/2+(r.offsetX||0);if(align==='right')return HPAD+cw-edgeR+(r.offsetX||0);return HPAD+edgeR+(r.offsetX||0);}
  function curved(c,text,font,cx2,cy2,cv,pass,useGrad){
    c.font=font;c.textAlign=align==='center'?'center':align==='right'?'right':'left';c.textBaseline='alphabetic';
    if(cv===0){if(pass==='stroke')c.strokeText(text,cx2,cy2);else c.fillText(text,cx2,cy2);return;}
    var tw=c.measureText(text).width,ac=Math.abs(cv);
    var radius=Math.max(tw*Math.max((110-ac)/(ac*0.9+0.1),0.6),tw*0.6);
    var arcB=cv>0,ta=tw/radius,sa=-ta/2;
    var acx=align==='left'?cx2+tw/2:align==='right'?cx2-tw/2:cx2;
    var acy=arcB?cy2+radius:cy2-radius;
    var chX=0;
    for(var i=0;i<text.length;i++){
      var ch=text[i],chW=c.measureText(ch).width,angle=sa+(chX+chW/2)/radius;
      var px2,py2,rot2;
      if(arcB){px2=acx+Math.sin(angle)*radius;py2=acy-Math.cos(angle)*radius;rot2=angle;}
      else{px2=acx+Math.sin(angle)*radius;py2=acy+Math.cos(angle)*radius;rot2=-angle;}
      c.save();c.translate(px2,py2);c.rotate(rot2);c.textAlign='center';c.textBaseline='alphabetic';
      if(pass==='stroke')c.strokeText(ch,0,0);
      else if(useGrad){var lg=c.createLinearGradient(0,TOP-py2,0,(TOP+textH)-py2);lg.addColorStop(0,gradTop);lg.addColorStop(1,gradBot);c.fillStyle=lg;c.fillText(ch,0,0);}
      else c.fillText(ch,0,0);
      c.restore();chX+=chW;
    }
  }
  var off=document.createElement('canvas');off.width=Math.round(cw)+HPAD*2;off.height=Math.round(totalH)+VPAD*2;
  var oc=off.getContext('2d');
  var sOff=document.createElement('canvas');sOff.width=off.width;sOff.height=off.height;var sc2=sOff.getContext('2d');
  // Shift all drawing down by VPAD so the visible sticker sits vertically centered with padding above and below.
  sc2.translate(0, VPAD); oc.translate(0, VPAD);
  sc2.strokeStyle='#fff';sc2.lineWidth=outline*2;sc2.lineJoin='round';
  rowPos.forEach(function(rp){curved(sc2,rp.row.text,FONT.replace('{S}',rp.row.size),getX(rp.row),rp.y,rp.row.curve,'stroke');});
  oc.save();oc.shadowColor=shColor;oc.shadowBlur=shadow*2*ssp;oc.shadowOffsetX=sdx*ssp;oc.shadowOffsetY=sdy*ssp;
  // Draw the padded sOff at (0,-VPAD) into oc (which also has a VPAD translate) so net is (0,0)
  oc.drawImage(sOff,0,-VPAD);oc.restore();
  oc.save();oc.strokeStyle='#fff';oc.lineWidth=outline*2.5;oc.lineJoin='round';oc.lineCap='round';oc.fillStyle='#fff';
  rowPos.forEach(function(rp){curved(oc,rp.row.text,FONT.replace('{S}',rp.row.size),getX(rp.row),rp.y,rp.row.curve,'stroke');curved(oc,rp.row.text,FONT.replace('{S}',rp.row.size),getX(rp.row),rp.y,rp.row.curve,'fill');});
  oc.restore();
  var grad=oc.createLinearGradient(0,TOP,0,y);grad.addColorStop(0,gradTop);grad.addColorStop(1,gradBot);
  oc.save();oc.fillStyle=grad;
  rowPos.forEach(function(rp){var isCurved=rp.row.curve!==0;curved(oc,rp.row.text,FONT.replace('{S}',rp.row.size),getX(rp.row),rp.y,rp.row.curve,'fill',isCurved);});
  oc.restore();
  ctx.save();
  var rot=layer.rotation||0;
  var lx=layer.x||0,ly=layer.y||0;
  if(rot){ctx.translate(lx+cw/2,ly+totalH/2);ctx.rotate(rot*Math.PI/180);ctx.translate(-(lx+cw/2),-(ly+totalH/2));}
  ctx.scale(sc,sc);
  // Source canvas has HPAD on each side horizontally and VPAD on top/bottom vertically. Shift destination to align.
  ctx.drawImage(off,0,0,off.width,off.height,(lx-HPAD)/sc,(ly-VPAD)/sc,off.width,off.height);
  ctx.restore();
}

// ── TEXT SCALE HELPERS ──
function bakeTextScale(id){
  var layer=layers.find(function(l){return l.id===id;});if(!layer)return;
  snapshotState();
  var ts=(layer.textScale||100)/100;
  layer.lines=layer.lines.map(function(l){return{text:l.text,size:Math.max(12,Math.round(l.size*ts)),offsetX:l.offsetX,curve:l.curve};});
  layer.textScale=100;renderProps();redraw();
}
function resetTextScale(id){
  var layer=layers.find(function(l){return l.id===id;});if(!layer)return;
  layer.textScale=100;renderProps();redraw();
}

// ── EXPORT MODAL ──
function openExportModal(){
  document.getElementById('exportW').value=canvasW;
  document.getElementById('exportH').value=canvasH;
  toggleExportSize();updateExportInfo();
  document.getElementById('exportModal').classList.remove('hidden');
}
function closeExportModal(){document.getElementById('exportModal').classList.add('hidden');}
function toggleExportSize(){
  var mode=document.getElementById('exportSizeMode').value;
  document.getElementById('exportCustomSize').classList.toggle('hidden',mode!=='custom');
  document.getElementById('exportScaleWrap').classList.toggle('hidden',mode!=='scale');
  document.getElementById('exportQualityWrap').classList.toggle('hidden',
    document.getElementById('exportFormat').value==='png');
  updateExportInfo();
}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('exportFormat').addEventListener('change',function(){
    var isPng=this.value==='png';
    document.getElementById('exportQualityWrap').classList.toggle('hidden',isPng);
    // update export btn label
    document.querySelector('.btn-primary').textContent='Export '+this.value.toUpperCase();
    updateExportInfo();
  });
});
function updateExportInfo(){
  var info=document.getElementById('exportInfo');if(!info)return;
  var ew=canvasW,eh=canvasH;
  var mode=document.getElementById('exportSizeMode')?document.getElementById('exportSizeMode').value:'full';
  if(mode==='custom'){ew=+document.getElementById('exportW').value||canvasW;eh=+document.getElementById('exportH').value||canvasH;}
  else if(mode==='scale'){var sc2=+document.getElementById('exportScale').value||1;ew=Math.round(canvasW*sc2);eh=Math.round(canvasH*sc2);}
  if(info)info.textContent='Output: '+ew+' × '+eh+' px';
}

function doExport(){
  var format=document.getElementById('exportFormat').value;
  var quality=(+document.getElementById('exportQuality').value)/100;
  var modeEl=document.getElementById('exportSizeMode');
  var mode=modeEl?modeEl.value:'full';
  var ew=canvasW,eh=canvasH;
  if(mode==='custom'){ew=+document.getElementById('exportW').value||canvasW;eh=+document.getElementById('exportH').value||canvasH;}
  else if(mode==='scale'){var scf=+document.getElementById('exportScale').value||1;ew=Math.round(canvasW*scf);eh=Math.round(canvasH*scf);}

  console.log('[export] canvasW=',canvasW,' canvasH=',canvasH,' mode=',mode,' ew=',ew,' eh=',eh,' layers=',layers.length);

  // Strategy: always render at 1:1 (canvasW × canvasH) first, then resize if needed.
  // This avoids any scaling-during-draw issues, especially with the sticker's internal off-screen canvas.
  var baseCanvas=document.createElement('canvas');baseCanvas.width=canvasW;baseCanvas.height=canvasH;
  var bctx=baseCanvas.getContext('2d');

  layers.forEach(function(layer,i){
    bctx.save();bctx.globalAlpha=(layer.opacity||100)/100;
    try{
      if(layer.type==='image')drawImageLayer(bctx,layer);
      else if(layer.type==='sticker')drawStickerLayer(bctx,layer);
      else if(layer.type==='shape')drawShapeLayer(bctx,layer);
      else if(layer.type==='svg')drawSvgLayer(bctx,layer);
      else if(layer.type==='text')drawTextLayer(bctx,layer);
    }catch(e){console.error('[export] layer',i,'type',layer.type,'error:',e);}
    bctx.restore();
  });

  // Now resize to requested output dimensions if different
  var outCanvas;
  if(ew===canvasW&&eh===canvasH){
    outCanvas=baseCanvas;
  } else {
    outCanvas=document.createElement('canvas');outCanvas.width=ew;outCanvas.height=eh;
    var octx=outCanvas.getContext('2d');
    octx.imageSmoothingEnabled=true;octx.imageSmoothingQuality='high';
    octx.drawImage(baseCanvas,0,0,canvasW,canvasH,0,0,ew,eh);
  }

  var mime={'png':'image/png','jpeg':'image/jpeg','webp':'image/webp'}[format]||'image/png';
  var dataUrl=format==='png'?outCanvas.toDataURL('image/png'):outCanvas.toDataURL(mime,quality);
  var link=document.createElement('a');
  link.download='smarterpaw-'+ew+'x'+eh+'.'+format;
  link.href=dataUrl;link.click();
  closeExportModal();
  redraw();
}
</script>
